<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>摸鱼图片视频遮罩</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>摸鱼遮罩</h1>
          <p id="currentDomain" class="domain">读取当前页面...</p>
        </div>
        <label class="switch" title="启用或停用插件">
          <input id="enabledToggle" type="checkbox" aria-label="启用插件">
          <span></span>
        </label>
      </header>

      <button id="addDomain" class="primary" type="button">添加当前域名</button>

      <section class="listSection" aria-label="已启用域名">
        <div class="listHeader">
          <h2>启用名单</h2>
          <span id="domainCount">0</span>
        </div>
        <ul id="domainList" class="domainList"></ul>
        <p id="emptyState" class="empty">暂无域名</p>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
